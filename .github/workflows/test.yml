name: Tests

on:
  push:
    branches: [main]
  pull_request:

# 最小权限（安全官 #20）：仅读取仓库内容即可运行测试，避免 GITHUB_TOKEN 越权
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      # actions/checkout 锁定为完整 commit SHA（供应链加固，避免 @v4 可变标签被篡改/劫持）
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # actions/setup-python 锁定为完整 commit SHA
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 依赖安装：如需更强的供应链保护，可改用
      #   pip install --require-hashes -r requirements.lock.txt
      # （由 `pip-compile --generate-hashes` 生成；Dependabot 会自动提交更新 PR）
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # 依赖锁定校验（v1.3.5）：确保提交的 requirements*.txt 与 .in 一致。
      # 注意：pip-tools 7.x 已移除 `pip-compile --check`，此处改为「重新生成并 diff」。
      # 漂移仅告警（continue-on-error），不阻断测试矩阵。
      - name: Verify locked requirements are up to date
        continue-on-error: true
        run: |
          pip install pip-tools
          cp requirements.txt /tmp/requirements.txt.committed
          cp requirements-dev.txt /tmp/requirements-dev.txt.committed
          pip-compile --generate-hashes -o requirements.txt requirements.in
          pip-compile --generate-hashes -o requirements-dev.txt requirements-dev.in
          diff -u /tmp/requirements.txt.committed requirements.txt
          diff -u /tmp/requirements-dev.txt.committed requirements-dev.txt

      - name: Run tests
        run: PYTHONPATH=scripts python -m pytest -v
